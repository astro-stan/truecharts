{{/* Define the script */}}
{{- define "grafana.download_dashboards" -}}
{{- $dashboards := .dashboards -}}
{{- $outputDir := .outputDir -}}
{{- $grafanaApiUrl := "https://grafana.com/api/dashboards/%v/revisions/%v/download" -}}
{{- $requestHeaders := (dict "Accept" "application/json") -}}

download-dashboards:
  enabled: true
  data:
    download-dashboards.sh: |
      #!/usr/bin/env sh
      set -eo pipefail
      {{- range $name, $objectData := $dashboards }}
        {{- if $objectData.enabled -}}
          {{ $fileName := (printf "%v/%v.json" $outputDir $name) -}}
          {{- $url := "" -}}
          {{- if $objectData.url -}}
            {{- $url = $objectData.url -}}
          {{- else if and (kindIs "map" $objectData.marketplace) $objectData.marketplace.id $objectData.marketplace.revision -}}
            {{- $url = (printf $grafanaApiUrl $objectData.marketplace.id $objectData.marketplace.revision) -}}
          {{- end -}}

          {{- if $url }}

      echo "Downloading '{{ $url }}' into '{{ $fileName }}'"
      wget \
          {{- range $headerKey, $headerValue := $requestHeaders }}
          --header "{{ $headerKey }}: {{ $headerValue }}" \
          {{- end }}
          -Y on \
          -T 60 \
          -O  - \
          {{ $url }} \
      {{- if $objectData.b64content }}
      | base64 -d \
      {{- end }}
      > {{ $fileName }}{{ if $objectData.datasource }} \
      && jq '
          def update_ds:
              if type == "string" then
                  if test("-- .* --") then
                      .
                  else
        {{- if kindIs "string" $objectData.datasource }}
                      "{{ $objectData.datasource }}"
        {{- else if kindIs "slice" $objectData.datasource }}
          {{- range $index, $source := $objectData.datasource }}
            {{- if eq $index 0 }}
                      if . == "{{ $source.name }}" then
                          "{{ $source.value }}"
            {{- else }}
                      elif . == "{{ $source.name }}" then
                          "{{ $source.value }}"
            {{- end }}
            {{- if eq $index (sub (len $objectData.datasource) 1) }}
                      else
                          .
                      end
            {{- end }}
          {{- end }}
        {{- else }}
                      .
        {{- end }}
                 end
              elif type == "object" and has("uid") then
                  .uid |= update_ds
              else
                  .
              end;
          (.. | select(objects | has("datasource")) | .datasource) |= update_ds
         ' < {{ $fileName }} > {{ $fileName }}.tmp \
      && mv {{ $fileName }}.tmp {{ $fileName }}{{ end }}{{if not $objectData.failOnError }} \
      || true{{ end }}
      echo
          {{- end }}
        {{- end -}}
      {{- end -}}
{{- end -}}
